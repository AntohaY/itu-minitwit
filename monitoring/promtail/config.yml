scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock # This helps with auto-discovery
        refresh_interval: 5s

    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log

    pipeline_stages:
      - json:
          expressions:
            log: log
            stream: stream
            time: time
      # This stage parses the filename to extract the container ID
      - regex:
          source: filename
          expression: ".*/containers/(?P<container_id>[^/]+)/.*"
      # This stage uses the Docker API (via the socket) to turn that ID into a name
      - docker: {}