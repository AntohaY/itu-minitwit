server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: central_rsyslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: rsyslog
          __path__: /var/log/remote/*/*.log
    pipeline_stages:
      # 1. Look at the file path and extract the host and service names
      - regex:
          source: filename
          expression: "^/var/log/remote/(?P<host>[^/]+)/(?P<service>[^/]+)\\.log$"

      # 2. Turn those extracted variables into official Loki labels
      - labels:
          host:
          service: