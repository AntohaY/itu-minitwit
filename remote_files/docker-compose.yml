services:
  dbserver:
    image: ${DOCKER_USERNAME}/dbminitwitimage:latest
    environment:
      - MONGO_INITDB_DATABASE=minitwit
    networks:
      - minitwit-network
    volumes:
      - minitwit_cloud_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s

  webserver:
    image: ${DOCKER_USERNAME}/webminitwitimage:latest
    depends_on:
      dbserver:
        condition: service_healthy
    ports:
      - "80:8080"
    environment:
      - DB_IP=dbserver
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - minitwit-network

  # --- NEW MONITORING SERVICES ---
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    networks:
      - minitwit-network
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_cloud_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - minitwit-network
    volumes:
      - grafana_cloud_data:/var/lib/grafana
    restart: unless-stopped

networks:
  minitwit-network:
    driver: bridge

volumes:
  minitwit_cloud_data:
  prometheus_cloud_data:
  grafana_cloud_data: