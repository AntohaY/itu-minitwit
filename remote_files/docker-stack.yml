services:
  webserver:
    image: ${DOCKER_USERNAME}/webminitwitimage:latest
    ports:
      - "8080:8080"
    environment:
      - MONGO_URI=${MONGO_URI}
    networks:
      - minitwit-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 3 # Scale  web application
      # -update_config-  ensures rolling updates. Which means, if we push a src version of the app and update ,
      # to the stack, Swarm will execute a rolling update to ensure app does not go offline.
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first

  prometheus:
    image: prom/prometheus:latest
    networks:
      - minitwit-network
    volumes:
      - /minitwit/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_cloud_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    deploy:
      placement:
        constraints:
          - node.role == manager # Keep data tied to this specific node

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    networks:
      - minitwit-network
    volumes:
      - grafana_cloud_data:/var/lib/grafana
      - /minitwit/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - /minitwit/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    deploy:
      placement:
        constraints:
          - node.role == manager

  loki:
    image: grafana/loki:latest
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - minitwit-network
    volumes:
      - loki_data:/loki
    deploy:
      placement:
        constraints:
          - node.role == manager

  promtail:
    image: grafana/promtail:latest
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    configs:
      - source: promtail_config_v2
        target: /etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - minitwit-network
    deploy:
      mode: global

  discordbot:
    image: ${DOCKER_USERNAME}/discordbotimage:latest
    environment:
      - MONGO_URI=${MONGO_URI}
      - DISCORD_TOKEN=${DISCORD_TOKEN}
    networks:
      - minitwit-network
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: stop-first
      placement:
        constraints:
          - node.role == manager

networks:
  minitwit-network:
    driver: overlay # Required for Swarm to communicate across Droplets

volumes:
  prometheus_cloud_data:
    external: true
    name: minitwit_prometheus_cloud_data

  grafana_cloud_data:
    external: true
    name: minitwit_grafana_cloud_data

  loki_data:

configs:
  promtail_config_v2:
    file: ./monitoring/promtail/config.yml
