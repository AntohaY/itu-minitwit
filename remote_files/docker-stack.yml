services:
  webserver:
    image: ${DOCKER_USERNAME}/webminitwitimage:latest
    ports:
      - "80:8080"
    environment:
      - MONGO_URI=${MONGO_URI}
#    volumes:
#      - /minitwit/new/logs:/usr/src/app/logs
    networks:
      - minitwit-network
#    logging: *syslog_logging
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 3 # Scale  web application
      # -update_config-  ensures rolling updates. Which means, if we push a new version of the app and update ,
      # to the stack, Swarm will execute a rolling update to ensure app does not go offline.
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    networks:
      - minitwit-network
    volumes:
      - /minitwit/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_cloud_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
#    logging: *syslog_logging
    deploy:
      placement:
        constraints:
          - node.role == manager # Keep data tied to this specific node

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    networks:
      - minitwit-network
    volumes:
      - grafana_cloud_data:/var/lib/grafana
      - /minitwit/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - /minitwit/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
#    logging: *syslog_logging
    deploy:
      placement:
        constraints:
          - node.role == manager

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - minitwit-network
#    logging: *syslog_logging
    deploy:
      placement:
        constraints:
          - node.role == manager

  promtail:
    image: grafana/promtail:latest
    volumes:
      - /minitwit/monitoring/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - minitwit-network
    deploy:
      mode: global

  discordbot:
    image: ${DOCKER_USERNAME}/discordbotimage:latest
    environment:
      - MONGO_URI=${MONGO_URI}
      - DISCORD_TOKEN=${DISCORD_TOKEN}
    networks:
      - minitwit-network
#    logging: *syslog_logging
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: stop-first
      placement:
        constraints:
          - node.role == manager

