name: Static Analysis 

on:
  push:
    branches: [ "development", "main" ]
  pull_request:
    branches: [ "development", "main" ]

jobs:
  lint-and-format:
    name: Run Linters and Formatters
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0' # Change this if you use a different Go version!

      # 4. TOOL 1: Run the Go Formatter
      - name: Check Go Formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go code is not formatted properly! Run 'gofmt -w .' locally."
            exit 1
          fi

      # 5. TOOL 2: Run the Go Linter
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ./new # Adjust this if your go.mod is in the root folder instead!

        # 6. TOOL 3: Run the Dockerfile Linter on ALL Dockerfiles
      - name: Run Hadolint on ALL Dockerfiles
        run: |
          # 1. Find every file that has 'Dockerfile' in its name
          for file in $(find . -type f -name "*Dockerfile*"); do
            echo "========================================="
            echo "Linting: $file"
            echo "========================================="
            
            # 2. Pass the file into the hadolint container
            docker run --rm -i hadolint/hadolint < "$file"
          done