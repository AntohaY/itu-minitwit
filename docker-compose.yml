x-syslog-logging: &syslog_logging
  driver: syslog
  options:
    syslog-address: udp://127.0.0.1:5514
    tag: "{{.Name}}"
    syslog-format: rfc5424micro

services:
  dbserver:
    image: mongo:8.0
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=minitwit
    volumes:
      - mongo_local_data:/data/db
    networks:
      - minitwit-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *syslog_logging

  webserver:
    build:
      context: ./new
      dockerfile: ../docker/web/Dockerfile.dev
    volumes:
      - ./new:/app
      - ./new/logs:/usr/src/app/logs
#    dns:
#      - 8.8.8.8
#      - 8.8.4.4
    depends_on:
      dbserver:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - MONGO_URI=mongodb://dbserver:27017/minitwit
    networks:
      - minitwit-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *syslog_logging

  clidownload:
    image: curlimages/curl
    depends_on:
      webserver:
        condition: service_healthy
    networks:
      - minitwit-network
    entrypoint: sh -c "curl http://webserver:8080"
    logging: *syslog_logging

  central-rsyslog:
    build:
      context: ./monitoring/rsyslog
      dockerfile: Dockerfile
    container_name: central-rsyslog
    restart: unless-stopped
    environment:
      - RSYSLOG_RETENTION_DAYS=7
      - RSYSLOG_CLEANUP_INTERVAL_SECONDS=3600
    ports:
      - "5514:514/tcp"
      - "5514:514/udp"
    networks:
      - minitwit-network
    volumes:
      - rsyslog_data:/var/log/remote

  grafana:
    build:
      dockerfile: ./Dockerfile
      context: ./monitoring/grafana
    image: grafana_image
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - minitwit-network
    volumes:
      - grafana-storage:/var/lib/grafana
    logging: *syslog_logging

  prometheus:
    build:
      dockerfile: ./Dockerfile
      context: ./monitoring/prometheus
    image: prometheus_image
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    networks:
      - minitwit-network
    logging: *syslog_logging

