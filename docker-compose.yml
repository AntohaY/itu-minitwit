services:
  dbserver:
    image: mongo:8.0
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=minitwit
    volumes:
      - mongo_local_data:/data/db
    networks:
      - minitwit-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  webserver:
    build:
      context: ./new
      dockerfile: ../docker/web/Dockerfile.dev
    volumes:
      - ./new:/app
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      dbserver:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - MONGO_URI=mongodb://dbserver:27017
    networks:
      - minitwit-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  clidownload:
    image: curlimages/curl
    depends_on:
      webserver:
        condition: service_healthy
    networks:
      - minitwit-network
    entrypoint: sh -c "curl http://webserver:8080"

  grafana:
    build:
      dockerfile: ./Dockerfile
      context: ./monitoring/grafana
    image: grafana_image
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - minitwit-network
    volumes:
      - grafana-storage:/var/lib/grafana

  prometheus:
    build:
      dockerfile: ./Dockerfile
      context: ./monitoring/prometheus
    image: prometheus_image
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    networks:
      - minitwit-network

  discordbot:
    build:
      context: ./new/bot
      dockerfile: Dockerfile
    depends_on:
      dbserver:
        condition: service_healthy
    environment:
      - MONGO_URI=mongodb://dbserver:27017
      - DISCORD_TOKEN=${DISCORD_TOKEN}
    networks:
      - minitwit-network

networks:
  minitwit-network:
    driver: bridge

volumes:
  mongo_local_data:
  grafana-storage: